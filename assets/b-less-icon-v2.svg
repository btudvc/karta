<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="B-Less logo">
  <title>B-Less</title>
  <desc>Full-bleed B-Less wordmark app icon</desc>
  <defs>
    <linearGradient id="bg" x1="88" y1="38" x2="424" y2="474" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#202127"/>
      <stop offset="0.62" stop-color="#111216"/>
      <stop offset="1" stop-color="#050506"/>
    </linearGradient>
    <linearGradient id="fg" x1="116" y1="142" x2="384" y2="370" gradientUnits="userSpaceOnUse">
